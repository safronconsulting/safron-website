kind = "web"
previewPath = "/"
title = "Safron"
version = "1.0.0"
id = "artifacts/safron"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23395

[services.development]
run = "pnpm run dev"

[services.production]
build = [ "pnpm", "run", "build" ]
publicDir = "dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23395"
BASE_PATH = "/"
